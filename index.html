<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Receipts</title>
    <meta name="description" content="A financial diary, not a spreadsheet. Snap a receipt; the text falls into its place." />

    <!-- Theme + icons -->
    <meta name="theme-color" content="#C97B5C" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS "Add to Home Screen" — launches standalone, full-bleed -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Receipts" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Receipts — a financial diary" />
    <meta property="og:description" content="A financial diary, not a spreadsheet. Snap a receipt; the text falls into its place." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X share -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Receipts — a financial diary" />
    <meta name="twitter:description" content="A financial diary, not a spreadsheet." />
    <meta name="twitter:image" content="/og.png" />

    <!-- Type -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400..700;1,400..700&family=Caveat:wght@400;500;600&family=Quicksand:wght@400;500;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
